version: '3'

services:
  app:
    build: .
    ports:
      - "5001:5000"
    environment:
      - PORT=5000 
      
  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"