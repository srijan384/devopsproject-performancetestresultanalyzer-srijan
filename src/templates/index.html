<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Performance Test Analyzer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1> Performance Test Analyzer</h1>
    <p class="subtitle">Upload your CSV file to analyze performance metrics</p>

    <div class="card">
        <form action="/upload" method="post" enctype="multipart/form-data">

            <label for="file" class="file-label">
                📂 Choose CSV File
            </label>

            <input type="file" name="file" id="file" required>

            <button type="submit" class="btn">
                Analyze Performance
            </button>

        </form>
    </div>

</div>

</body>
</html>
