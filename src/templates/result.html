<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysis Result</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='result.css') }}">
</head>
<body>

<div class="container">

    <h1 class="title">Analysis Results</h1>

    <!-- Metrics Cards -->
    <div class="cards">

        <div class="card metric">
            <h3>Average Response Time</h3>
            <p>{{ avg }} ms</p>
        </div>

        <div class="card metric">
            <h3>Maximum Response Time</h3>
            <p>{{ max }} ms</p>
        </div>

    </div>

    <!-- Graph Section -->
    <div class="card graph-card">
        <h3>Response Time Trend</h3>
        <img src="{{ url_for('static', filename=graph) }}" alt="Graph">
    </div>

    <!-- Back Button -->
    <a href="/" class="btn back-btn">⬅ Back to Upload</a>

</div>

</body>
</html>
